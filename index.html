<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daniel Godinho Cordeiro · Links</title>
  <meta name="description" content="Apps, projetos e redes de Daniel Godinho Cordeiro — CTO @ LAD Sistemas, Backend & IA, Triatleta." />

  <!-- Open Graph / compartilhamento -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Daniel Godinho Cordeiro · Links" />
  <meta property="og:description" content="Apps, projetos e redes — Backend & IA, CTO @ LAD Sistemas, Triatleta." />
  <meta property="og:image" content="https://github.com/danielcordeiro.png?size=460" />
  <meta property="og:url" content="https://danielcordeiro.github.io" />
  <meta name="twitter:card" content="summary" />

  <link rel="icon" href="https://github.com/danielcordeiro.png?size=64" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #07090d;
      --bg-soft: #0e1117;
      --card: #12151c;
      --card-hover: #171b24;
      --border: #232834;
      --border-hover: #38404f;
      --text: #e8eaed;
      --muted: #8b93a1;
      --faint: #5b626f;
      --accent: #38e0c8;
      --accent-2: #4f9cff;
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
      padding: 56px 20px 40px;
      position: relative;
      overflow-x: hidden;
    }

    /* glow de fundo */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(620px circle at 50% -8%, rgba(56, 224, 200, 0.10), transparent 60%),
        radial-gradient(700px circle at 50% 120%, rgba(79, 156, 255, 0.08), transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 1;
    }

    /* ---- header ---- */
    .header { text-align: center; margin-bottom: 36px; }

    .avatar-ring {
      width: 104px;
      height: 104px;
      margin: 0 auto 18px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 12px 40px rgba(56,224,200,0.18);
    }
    .avatar-ring img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 3px solid var(--bg);
      background: var(--bg-soft);
    }

    .name {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.92rem;
      margin-top: 8px;
      font-weight: 500;
    }

    .location {
      color: var(--faint);
      font-size: 0.82rem;
      margin-top: 6px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .location svg { width: 13px; height: 13px; opacity: 0.8; }

    /* ---- seções ---- */
    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--faint);
      margin: 28px 4px 12px;
    }

    .links { display: flex; flex-direction: column; gap: 11px; }

    .link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
      position: relative;
    }
    .link:hover, .link:focus-visible {
      transform: translateY(-2px);
      background: var(--card-hover);
      border-color: var(--border-hover);
      outline: none;
    }
    .link:active { transform: translateY(0); }

    .icon {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      background: var(--bg-soft);
      border: 1px solid var(--border);
      color: var(--accent);
    }
    .icon svg { width: 20px; height: 20px; }

    .link-text { flex: 1; min-width: 0; }
    .link-title { display: block; font-weight: 600; font-size: 0.97rem; line-height: 1.25; }
    .link-sub { display: block; color: var(--muted); font-size: 0.8rem; margin-top: 4px; line-height: 1.3; }

    .chev {
      flex-shrink: 0;
      color: var(--faint);
      transition: transform 0.16s ease, color 0.16s ease;
    }
    .link:hover .chev { transform: translateX(3px); color: var(--muted); }
    .chev svg { width: 18px; height: 18px; display: block; }

    /* ---- footer ---- */
    .footer {
      text-align: center;
      margin-top: 40px;
      color: var(--faint);
      font-size: 0.78rem;
    }
    .footer a { color: var(--muted); text-decoration: none; }
    .footer a:hover { color: var(--accent); }

    @media (max-width: 380px) {
      body { padding-top: 40px; }
      .link-sub { display: none; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header class="header">
      <div class="avatar-ring">
        <img src="https://github.com/danielcordeiro.png?size=208" alt="Daniel Godinho Cordeiro" width="104" height="104" />
      </div>
      <h1 class="name">Daniel Godinho Cordeiro</h1>
      <p class="tagline">CTO @ LAD Sistemas · Backend &amp; IA · Triatleta 🏊 🚴 🏃</p>
      <p class="location">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        Goiânia, Brasil
      </p>
    </header>

    <p class="section-label">Apps &amp; Projetos</p>
    <nav class="links" id="apps"></nav>

    <p class="section-label">Conecte-se</p>
    <nav class="links" id="social"></nav>

    <footer class="footer">
      © <span id="year"></span> Daniel Godinho Cordeiro ·
      <a href="https://github.com/danielcordeiro/danielcordeiro.github.io">código</a>
    </footer>
  </main>

  <script>
    // ====== Edite seus links aqui ======
    const ICONS = {
      split:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h18M3 18h18"/><circle cx="7" cy="6" r="0"/></svg>',
      receipt:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l3-2 3 2 3-2 3 2 3-2V2l-3 2-3-2-3 2-3-2-3 2z"/><path d="M8 8h8M8 12h6"/></svg>',
      game:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="4"/><path d="M7 12h2M8 11v2"/><circle cx="16" cy="11" r="1"/><circle cx="18" cy="14" r="1"/></svg>',
      cart:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>',
      activity:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>',
      linkedin:'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14zM8.34 18.34V9.74H5.67v8.6h2.67zM7 8.57a1.55 1.55 0 1 0 0-3.1 1.55 1.55 0 0 0 0 3.1zm11.34 9.77v-4.93c0-2.36-1.26-3.46-2.94-3.46-1.36 0-1.96.75-2.3 1.27V9.74h-2.66c.04.75 0 8.6 0 8.6h2.66v-4.8c0-.24.02-.48.09-.65.19-.48.62-.97 1.35-.97.96 0 1.34.72 1.34 1.79v4.63h2.66z"/></svg>',
      github: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.5.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.46-1.16-1.11-1.47-1.11-1.47-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.9 1.52 2.34 1.08 2.91.83.09-.65.35-1.08.63-1.33-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02a9.6 9.6 0 0 1 5 0c1.91-1.29 2.75-1.02 2.75-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.69-4.57 4.94.36.31.68.92.68 1.85v2.74c0 .27.18.58.69.48A10 10 0 0 0 22 12c0-5.52-4.48-10-10-10z"/></svg>',
      globe:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15 15 0 0 1 0 20 15 15 0 0 1 0-20z"/></svg>',
      mail:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="m3 7 9 6 9-6"/></svg>',
      percent:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>',
      send:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>',
      calendar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="3"/><path d="M8 3v4M16 3v4M3 10h18"/><circle cx="12" cy="15.5" r="1.5"/></svg>'
    };

    const apps = [
      { icon: 'split',    title: 'Rachaí',          sub: 'Divida a conta sem dor de cabeça',     url: 'https://danielcordeiro.github.io/rachai/' },
      { icon: 'activity', title: 'Endura',          sub: 'Performance para triatletas · IA',     url: 'https://endura-web.onrender.com/' },
      { icon: 'game',     title: 'Impostor',        sub: 'Jogo de festa · passe o celular',      url: 'https://danielcordeiro.github.io/impostor-game/' },
      { icon: 'cart',     title: 'Produtos que uso',sub: 'Gear e ferramentas que recomendo',     url: 'https://danielcordeiro.github.io/produtos-uteis/' },
      { icon: 'percent',  title: 'JuroCerto',       sub: 'Calcule juros e simule financiamento', url: 'https://danielcordeiro.github.io/jurocerto/' },
      { icon: 'send',     title: 'Mando',           sub: 'Delegue tarefas via WhatsApp, sem app nem senha', url: 'https://mando.planilha.me/' },
      { icon: 'calendar', title: 'Agenda AI',       sub: 'Sua clínica agendando pelo WhatsApp · IA', url: 'https://agenda-ai.planilha.me/' }
    ];

    const social = [
      { icon: 'linkedin', title: 'LinkedIn',  sub: '/in/danielgodinhocordeiro', url: 'https://www.linkedin.com/in/danielgodinhocordeiro' },
      { icon: 'github',   title: 'GitHub',    sub: '@danielcordeiro',        url: 'https://github.com/danielcordeiro' },
      { icon: 'globe',    title: 'LAD Food',  sub: 'Gestão para food service',url: 'https://ladfood.com.br' },
      { icon: 'mail',     title: 'Email',     sub: 'dgodinhoc@gmail.com',    url: 'mailto:dgodinhoc@gmail.com' }
    ];
    // ===================================

    const chevron = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>';

    function render(items, el) {
      el.innerHTML = items.map(function (it) {
        var external = it.url.indexOf('mailto:') === 0 ? '' : ' target="_blank" rel="noopener"';
        return '<a class="link" href="' + it.url + '"' + external + '>' +
          '<span class="icon">' + ICONS[it.icon] + '</span>' +
          '<span class="link-text"><span class="link-title">' + it.title + '</span>' +
          '<span class="link-sub">' + it.sub + '</span></span>' +
          '<span class="chev">' + chevron + '</span>' +
        '</a>';
      }).join('');
    }

    render(apps, document.getElementById('apps'));
    render(social, document.getElementById('social'));
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
